<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' mediastream:;" />
  <title>JebToSendIt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bezel">
    <!-- pasek tytułu (przeciąganie okna) -->
    <header class="titlebar">
      <div class="brand">
        <span class="bolt">⚡</span>
        <span class="name">JEB<span class="accent">TO</span>SENDIT</span>
        <span class="ver">v0.1</span>
      </div>
      <div class="winbtns">
        <button id="btnLang" class="winbtn lang" data-i18n-title="lang.toggleTitle">EN</button>
        <button id="btnMin" class="winbtn" data-i18n-title="win.minimize">—</button>
        <button id="btnHide" class="winbtn hide" data-i18n-title="win.hideToTray">⌄</button>
        <button id="btnQuit" class="winbtn quit" data-i18n-title="win.close">✕</button>
      </div>
    </header>

    <main class="content">
    <!-- listwa statusu + włącznik -->
    <section class="statusbar">
      <div class="led-wrap">
        <span id="led" class="led"></span>
        <span id="statusText" class="status-text">ASLEEP</span>
      </div>
      <button id="armSwitch" class="arm-switch" aria-pressed="false">
        <span class="knobball"></span>
        <span class="arm-label">ARM</span>
      </button>
    </section>

    <!-- centralny "scope" -->
    <section class="scope-card">
      <canvas id="scope" width="760" height="300"></canvas>
      <div id="hitChip" class="hit-chip">JEBS: 0</div>
      <div id="hitBadge" class="hit-badge">JEB!</div>
    </section>

    <!-- knoby -->
    <section class="knobs">
      <div class="knob-cell">
        <div class="knob" id="knobThreshold"></div>
        <div class="knob-label" data-i18n="knob.threshold">THRESHOLD</div>
        <div class="knob-val" id="valThreshold">0.25</div>
      </div>
      <div class="knob-cell">
        <div class="knob" id="knobMatch"></div>
        <div class="knob-label" data-i18n="knob.match">MATCH</div>
        <div class="knob-val" id="valMatch">80%</div>
      </div>
      <div class="knob-cell">
        <div class="knob" id="knobCooldown"></div>
        <div class="knob-label" data-i18n="knob.cooldown">COOLDOWN</div>
        <div class="knob-val" id="valCooldown">350 ms</div>
      </div>
    </section>

    <!-- profil akustyczny jebnięcia -->
    <section class="panel">
      <div class="panel-title"><span data-i18n="profile.title">JEB PROFILE</span> <span class="panel-sub" data-i18n="profile.sub">(spectral fingerprint)</span></div>
      <div class="profile-row">
        <div id="profSpectrum" class="spectrum"></div>
        <div class="profile-info">
          <div id="verdict" class="verdict">—</div>
          <div id="profMeta" class="profmeta" data-i18n="profile.none">no profile — calibrate your JEB</div>
        </div>
      </div>
    </section>

    <!-- kalibracja -->
    <section class="panel">
      <div class="panel-title" data-i18n="calib.title">JEB CALIBRATION</div>
      <button id="btnCalibrate" class="cta" data-i18n="calib.button">⦿ CALIBRATE — JEB 2-3 TIMES</button>
      <div id="calStatus" class="cal-status" data-i18n="calib.hint">I'll record the sound and length of your JEB — a shout won't fire ENTER.</div>
    </section>

    <!-- urządzenie -->
    <section class="panel">
      <div class="panel-title" data-i18n="device.title">AUDIO INPUT</div>
      <select id="deviceSelect" class="select"></select>
    </section>

    <footer class="foot">
      <label class="chk">
        <input type="checkbox" id="startMin" /> <span data-i18n="footer.startMin">start minimized</span>
      </label>
      <span class="hint"><span data-i18n="footer.hintPre">armed = a JEB fires</span> <b id="keyName">ENTER</b></span>
    </footer>
    </main>
  </div>

  <script src="vendor/i18next.min.js"></script>
  <script src="locales.js"></script>
  <script src="i18n.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
