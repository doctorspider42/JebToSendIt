<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' mediastream:;" />
  <title>JebToSendIt</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bezel">
    <!-- pasek tytułu (przeciąganie okna) -->
    <header class="titlebar">
      <div class="brand">
        <span class="bolt">⚡</span>
        <span class="name">JEB<span class="accent">TO</span>SENDIT</span>
        <span class="ver">v0.1</span>
      </div>
      <div class="winbtns">
        <button id="btnMin" class="winbtn" title="Minimalizuj">—</button>
        <button id="btnHide" class="winbtn hide" title="Schowaj do tray">⌄</button>
        <button id="btnQuit" class="winbtn quit" title="Zamknij">✕</button>
      </div>
    </header>

    <!-- listwa statusu + włącznik -->
    <section class="statusbar">
      <div class="led-wrap">
        <span id="led" class="led"></span>
        <span id="statusText" class="status-text">UŚPIONY</span>
      </div>
      <button id="armSwitch" class="arm-switch" aria-pressed="false">
        <span class="knobball"></span>
        <span class="arm-label">ARM</span>
      </button>
    </section>

    <!-- centralny "scope" -->
    <section class="scope-card">
      <canvas id="scope" width="760" height="300"></canvas>
      <div id="hitChip" class="hit-chip">JEBNIĘĆ: 0</div>
      <div id="hitBadge" class="hit-badge">JEB!</div>
    </section>

    <!-- knoby -->
    <section class="knobs">
      <div class="knob-cell">
        <div class="knob" id="knobThreshold"></div>
        <div class="knob-label">PRÓG</div>
        <div class="knob-val" id="valThreshold">0.25</div>
      </div>
      <div class="knob-cell">
        <div class="knob" id="knobMatch"></div>
        <div class="knob-label">DOPASOWANIE</div>
        <div class="knob-val" id="valMatch">80%</div>
      </div>
      <div class="knob-cell">
        <div class="knob" id="knobCooldown"></div>
        <div class="knob-label">COOLDOWN</div>
        <div class="knob-val" id="valCooldown">350 ms</div>
      </div>
    </section>

    <!-- profil akustyczny jebnięcia -->
    <section class="panel">
      <div class="panel-title">PROFIL JEBNIĘCIA <span class="panel-sub">(odcisk widmowy)</span></div>
      <div class="profile-row">
        <div id="profSpectrum" class="spectrum"></div>
        <div class="profile-info">
          <div id="verdict" class="verdict">—</div>
          <div id="profMeta" class="profmeta">brak profilu — skalibruj jebnięcie</div>
        </div>
      </div>
    </section>

    <!-- kalibracja -->
    <section class="panel">
      <div class="panel-title">KALIBRACJA JEBNIĘCIA</div>
      <button id="btnCalibrate" class="cta">⦿ KALIBRUJ — JEBNIJ 2-3 RAZY</button>
      <div id="calStatus" class="cal-status">Nagram brzmienie i długość Twojego jebnięcia — krzyk nie puści ENTER.</div>
    </section>

    <!-- urządzenie -->
    <section class="panel">
      <div class="panel-title">WEJŚCIE AUDIO</div>
      <select id="deviceSelect" class="select"></select>
    </section>

    <footer class="foot">
      <label class="chk">
        <input type="checkbox" id="startMin" /> start zminimalizowany
      </label>
      <span class="hint">uzbrojony = uderzenie wysyła <b id="keyName">ENTER</b></span>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
